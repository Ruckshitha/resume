<!DOCTYPE html>
<html>
<head>
    <title>Song Manager</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center text-primary mb-4">Song Manager</h2>

    <div class="input-group mb-3">
        <input type="text" id="song" class="form-control" placeholder="Enter Song Name">
        <button class="btn btn-success" onclick="addSong()">Add Song</button>
    </div>

    <table class="table table-bordered table-striped text-center">
        <thead class="table-dark">
            <tr>
                <th>S.No</th>
                <th>Song Name</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>

</div>

<script>
let count = 1;

function addSong() {

    let song = document.getElementById("song").value;

    if(song == ""){
        alert("Enter a Song");
        return;
    }

    let row = `
    <tr>
        <td>${count++}</td>
        <td>${song}</td>
        <td>
            <button class="btn btn-warning btn-sm"
            onclick="editRow(this)">Edit</button>
        </td>
        <td>
            <button class="btn btn-danger btn-sm"
            onclick="deleteRow(this)">Delete</button>
        </td>
    </tr>`;

    document.getElementById("tableBody").innerHTML += row;

    document.getElementById("song").value = "";
}

function editRow(btn) {
    let row = btn.parentNode.parentNode;
    let oldSong = row.cells[1].innerHTML;

    let newSong = prompt("Edit Song", oldSong);

    if(newSong != null && newSong != "") {
        row.cells[1].innerHTML = newSong;
    }
}

function deleteRow(btn) {
    btn.parentNode.parentNode.remove();
}
</script>

</body>
</html>
